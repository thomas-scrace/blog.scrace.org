<!-- @dsCard group="Type" viewport="700x260" name="Type scale" subtitle="The reading-first scale, display down to caption" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 26px; }
  .r { display:flex; align-items:baseline; gap: 18px; color: var(--text-strong); font-family: var(--font-serif); border-bottom: 1px solid var(--ink-700); padding: 7px 0; }
  .r:last-child { border-bottom: 0; }
  .r .tag { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); width: 86px; flex: none; }
  .s { font-weight: 400; line-height: 1; white-space: nowrap; }
</style>
</head>
<body>
  <div class="r"><span class="tag">2xl · 44</span><span class="s" style="font-size:44px">Title</span></div>
  <div class="r"><span class="tag">xl · 34</span><span class="s" style="font-size:34px">Heading two</span></div>
  <div class="r"><span class="tag">lg · 26</span><span class="s" style="font-size:26px">Heading three</span></div>
  <div class="r"><span class="tag">base · 19</span><span class="s" style="font-size:19px">Body prose reads here</span></div>
  <div class="r"><span class="tag">sm · 15</span><span class="s" style="font-size:15px;color:var(--text-muted)">Secondary &amp; UI</span></div>
  <div class="r"><span class="tag">xs · 13</span><span class="s" style="font-size:13px;color:var(--text-faint)">Caption &amp; meta</span></div>
</body>
</html>
