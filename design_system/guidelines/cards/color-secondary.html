<!-- @dsCard group="Colors" viewport="700x150" name="Secondary marks" subtitle="Terracotta & sage — rare, for tags and status" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .lab { font-family: var(--font-meta); font-size: 11px; letter-spacing: .04em; color: var(--text-faint); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--terra-400)"></div><div class="lab">terracotta</div><div class="hex">#C06A4E</div></div>
    <div class="sw"><div class="chip" style="background:var(--terra-500)"></div><div class="lab">terracotta deep</div><div class="hex">#9E5240</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-400)"></div><div class="lab">sage</div><div class="hex">#8AA081</div></div>
    <div class="sw"><div class="chip" style="background:var(--sage-500)"></div><div class="lab">sage deep</div><div class="hex">#6B8064</div></div>
  </div>
</body>
</html>
