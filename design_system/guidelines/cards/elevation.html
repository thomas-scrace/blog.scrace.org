<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Deep, soft, low-opacity shadows for dark surfaces" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px 26px; background: var(--ink-850); }
  .row { display:flex; gap: 34px; align-items:center; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 14px; }
  .box { width: 96px; height: 60px; background: var(--surface-raised); border: 1px solid var(--border-hairline); border-radius: var(--radius-md); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div></div>
    <div class="col"><div class="box" style="box-shadow:var(--shadow-inset)"></div><div class="lab">inset</div></div>
  </div>
</body>
</html>
