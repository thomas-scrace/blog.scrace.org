<!-- @dsCard group="Type" viewport="700x230" name="Body prose" subtitle="19px Georgia, 1.72 leading — the reading default" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; }
  .p { font-family: var(--font-body); font-size: 19px; line-height: 1.72; color: var(--text-body); max-width: 34rem; text-wrap: pretty; }
  .p em { font-style: italic; }
  .p a { color: var(--accent); border-bottom: 1px solid var(--accent-press); }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); margin-top: 14px; }
</style>
</head>
<body>
  <p class="p">There is a particular pleasure in a sentence that knows where it is going — one that <em>carries</em> the reader, unhurried, toward a thought worth having. Good prose is an act of <a href="#">attention</a>, paid forward.</p>
  <div class="meta">Georgia · 19px / 1.72 · measure ≈ 66ch · old-style numerals</div>
</body>
</html>
