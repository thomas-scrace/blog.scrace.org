<!-- @dsCard group="Colors" viewport="700x150" name="Ink — surfaces" subtitle="Warm near-black backgrounds, darkest to lightest" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 22px 24px; }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; }
  .chip { height: 60px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .lab { font-family: var(--font-meta); font-size: 11px; letter-spacing: .04em; color: var(--text-faint); margin-top: 8px; }
  .hex { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ink-900)"></div><div class="lab">page</div><div class="hex">#14120F</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-800)"></div><div class="lab">raised</div><div class="hex">#1D1A15</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-700)"></div><div class="lab">hover</div><div class="hex">#25211B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-600)"></div><div class="lab">sunken</div><div class="hex">#2F2A22</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-500)"></div><div class="lab">border</div><div class="hex">#3A342B</div></div>
    <div class="sw"><div class="chip" style="background:var(--ink-400)"></div><div class="lab">border+</div><div class="hex">#4A4339</div></div>
  </div>
</body>
</html>
