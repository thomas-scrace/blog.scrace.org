<!-- @dsCard group="Spacing" viewport="700x150" name="Corner radii" subtitle="Modest, paper-like rounding" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 24px 26px; }
  .row { display:flex; gap: 20px; align-items:flex-end; }
  .col { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box { width: 64px; height: 56px; background: var(--surface-raised); border: 1px solid var(--border-strong); }
  .lab { font-family: var(--font-mono); font-size: 11px; color: var(--text-faint); }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="box" style="border-radius:var(--radius-xs)"></div><div class="lab">xs · 2</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm · 4</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md · 7</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · 12</div></div>
    <div class="col"><div class="box" style="border-radius:var(--radius-pill);width:90px"></div><div class="lab">pill</div></div>
  </div>
</body>
</html>
