{{ define "main" }}
<div class="wrap">
  {{- with .Content }}<div class="home-intro">{{ . }}</div>{{ end }}

  {{ partial "tag-row.html" (dict "current" "home") }}

  <div class="post-list">
    {{- range sort (where site.RegularPages "Section" "posts") "Date" "desc" }}
    {{- partial "post-card.html" . }}
    {{- end }}
  </div>
</div>
{{ end }}
