{{- /* Inline SVG icons (Lucide paths, MIT). Static markup — zero JavaScript.
       Decorative by default; give the surrounding link an aria-label. */ -}}
{{- $name := .name -}}
<span class="icon">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
{{- if eq $name "rss" -}}
<path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1"/>
{{- else if eq $name "mail" -}}
<rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
{{- else if eq $name "arrow-up-right" -}}
<path d="M7 7h10v10"/><path d="M7 17 17 7"/>
{{- else if eq $name "arrow-left" -}}
<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
{{- end -}}
</svg>
</span>
