<footer class="footer">
  <div class="footer__inner">
    <p class="footer__brand">
      {{ site.Params.author | default site.Title }}
      {{- with site.Params.tagline }}<span class="footer__tagline">{{ . }}</span>{{ end }}
    </p>
    <div class="footer__links">
      <a href="{{ "index.xml" | relURL }}">RSS</a>
      {{- with site.Params.email }}<a href="mailto:{{ . }}">Email</a>{{ end }}
      <a href="{{ "/posts/" | relURL }}">Index</a>
      <span class="footer__copy">© {{ now.Year }}</span>
    </div>
  </div>
</footer>
